name: Bug report
description: Report reproducible agentd behavior that looks incorrect.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands, Agent Definition snippets with secrets removed, and observed output.
      placeholder: |
        1. Run `...`
        2. Apply `...`
        3. See `...`
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: commit SHA or release version
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Go version, and relevant agentd configuration without secret values.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs with API keys, tokens, private paths, and credentials removed.
      render: text
