openapi: 3.1.0
info:
  title: agentd Local Daemon API
  version: 0.1.0
  description: REST contract between the agentd CLI and agentdserver.
servers:
  - url: http://127.0.0.1:18080
paths:
  /health:
    get:
      summary: Check daemon health
      responses:
        "200":
          description: Daemon is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/agents:
    get:
      summary: List applied Agents
      responses:
        "200":
          description: Agents listed
          content:
            application/json:
              schema:
                type: object
                required: [agents]
                properties:
                  agents:
                    type: array
                    items:
                      $ref: "#/components/schemas/AgentSummary"
  /v1/agents/apply:
    post:
      summary: Apply a Markdown Agent Definition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyRequest"
      responses:
        "200":
          description: Definition applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplyResponse"
        "400":
          description: Definition validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/agents/{name}:
    get:
      summary: Inspect an Agent
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDetail"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/agents/{name}/runs:
    post:
      summary: Execute an Agent immediately
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "202":
          description: Run accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunResponse"
        "409":
          description: Agent already has an active run or cannot be executed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/agents/{name}/runs/{run_id}/stop:
    post:
      summary: Stop a specific Agent Run
      parameters:
        - $ref: "#/components/parameters/AgentName"
        - $ref: "#/components/parameters/RunID"
      responses:
        "202":
          description: Stop requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunResponse"
        "404":
          description: Agent or run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/agents/{name}/logs:
    get:
      summary: Read isolated logs for an Agent
      parameters:
        - $ref: "#/components/parameters/AgentName"
        - name: run_id
          in: query
          schema:
            type: string
        - name: tail
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 10000
      responses:
        "200":
          description: Logs returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogsResponse"
        "404":
          description: Agent or logs not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  parameters:
    AgentName:
      name: name
      in: path
      required: true
      schema:
        type: string
    RunID:
      name: run_id
      in: path
      required: true
      schema:
        type: string
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
    ApplyRequest:
      type: object
      required: [source_path, markdown]
      properties:
        source_path:
          type: string
        markdown:
          type: string
    ApplyResponse:
      type: object
      required: [outcome, agent]
      properties:
        outcome:
          type: string
          enum: [created, updated, unchanged]
        agent:
          $ref: "#/components/schemas/AgentDetail"
    AgentSummary:
      type: object
      required: [name, enabled, status, schedule_type]
      properties:
        name:
          type: string
        enabled:
          type: boolean
        status:
          type: string
        schedule_type:
          type: string
          enum: [cron, manual]
        next_run_at:
          type: string
          format: date-time
        last_run_status:
          type: string
    AgentDetail:
      allOf:
        - $ref: "#/components/schemas/AgentSummary"
        - type: object
          required: [revision, vendor_name, vendor_model]
          properties:
            revision:
              type: string
            vendor_name:
              type: string
            vendor_model:
              type: string
            last_run_id:
              type: string
            recent_error:
              type: string
    RunResponse:
      type: object
      required: [run_id, agent_name, status]
      properties:
        run_id:
          type: string
        agent_name:
          type: string
        status:
          type: string
          enum: [queued, running, completed, failed, stopping, stopped, interrupted]
    LogsResponse:
      type: object
      required: [agent_name, entries]
      properties:
        agent_name:
          type: string
        run_id:
          type: string
        entries:
          type: array
          items:
            type: object
            required: [timestamp, line]
            properties:
              timestamp:
                type: string
                format: date-time
              run_id:
                type: string
              line:
                type: string
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            fields:
              type: array
              items:
                type: object
                required: [path, message]
                properties:
                  path:
                    type: string
                  message:
                    type: string
